name: backup_file

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 1"

jobs:
  backup:
    runs-on: node22
    container:
      volumes:
        - /data/next-cloud/data/yunyuyuan/files/nuxt3-blog-imgs:/nuxt3-blog-imgs
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        # 仅用于我个人使用，因为我的博客实际上在blog分支
        with:
          ref: ${{ secrets.REAL_TARGET_BRANCH || gitea.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install pnpm
        run: npm i -g pnpm

      - name: Install dependencies
        run: pnpm i

      - name: Generate file map
        run: pnpm local:generate-file-map
        env:
          NB_PASSWD: ${{ secrets.NB_PASSWD }}
          NB_FILE_REGEX: ${{ secrets.NB_FILE_REGEX }}

      - name: Download files
        run: pnpm local:download-file
        env:
          FILE_USER: ${{ secrets.FILE_USER }}
          FILE_GROUP: ${{ secrets.FILE_GROUP }}
          NB_PASSWD: ${{ secrets.NB_PASSWD }}
          NB_FILE_REGEX: ${{ secrets.NB_FILE_REGEX }}
          NB_FILES_DIR: /nuxt3-blog-imgs
